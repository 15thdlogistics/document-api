name = "document-api"
main = "src/index.js"
compatibility_date = "2024-04-01"
workers_dev = true

########################################################
# 🗄 D1 (SQLite)
########################################################

[[d1_databases]]
binding = "schema"
database_name = "schema"
database_id = "PASTE_YOUR_D1_DATABASE_ID_HERE" # Required for some build pipelines
migrations_dir = "migrations"

########################################################
# 📦 R2 BUCKETS
########################################################

[[r2_buckets]]
binding = "MISSION_DOCS"
bucket_name = "mission-docs"

[[r2_buckets]]
binding = "OPERATOR_DOCS"
bucket_name = "operator-docs"

[[r2_buckets]]
binding = "FLEET_DOCS"
bucket_name = "fleet-docs"

[[r2_buckets]]
binding = "AUTOFLEET_DOCS"
bucket_name = "autofleet-docs"

########################################################
# 🧠 DURABLE OBJECTS
########################################################

[[durable_objects.bindings]]
name = "MISSION_STATE"
class_name = "MissionState"

[[durable_objects.bindings]]
name = "MISSION_CLOCKS"
class_name = "MissionClocks"

# Ensure migrations are sequential. Start at v1 for a fresh repo build.
[[migrations]]
tag = "v1" 
new_sqlite_classes = ["MissionState", "MissionClocks"]

########################################################
# 📡 INTERNAL SERVICE BINDINGS
########################################################

[[services]]
binding = "icc-orm-engine"
service = "icc-orm-engine"

[[services]]
binding = "icc-pivot-engine"
service = "icc-pivot-engine"

[[services]]
binding = "icc-mission-engine"
service = "icc-mission-engine"

[[services]]
binding = "mission-comms"
service = "mission-comms"

########################################################
# 🔐 ENV VARS
########################################################

[vars]
# DO NOT commit secrets here in real production. 
# Use 'npx wrangler secret put AI_API_KEY' for final deployment.
AI_API_KEY = "AIzaSyDB5jm6jBQIMsBSe2TGO65E2btJ7o8eL_Q"

[observability]
enabled = true